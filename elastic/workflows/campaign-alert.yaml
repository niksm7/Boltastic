name: campaign-alert
description: Campaign alert workflow for Nova agent. Creates Jira task and Slack notification for campaign issues.
triggers:
  - type: manual

inputs:
  - name: campaign_id
    type: string
    required: true
    description: Campaign ID
  - name: insight_text
    type: string
    required: true
    description: Insight or alert message

steps:
  - name: create_jira_task
    type: jira.pushToService
    connector-id: 44b1c510-1a8c-48b7-a274-a79b0877751d
    with:
      incident:
        issueType: "10004"
        summary: "Campaign Alert: {{ inputs.campaign_id }}"
        labels:
          - "Marketing"
        priority: "High"
        description: |
          Campaign: {{ inputs.campaign_id }}
          
          Alert: {{ inputs.insight_text }}
          
          Generated by Boltastic Nova Agent

  - name: notify_slack
    type: slack
    connector-id: "b0a652ff-0cad-4178-97c4-c2209cf26789"
    with:
      message: |
        📊 *Campaign Alert*
        
        *Campaign:* {{ inputs.campaign_id }}
        
        *Alert:* {{ inputs.insight_text }}
        
        {% if steps.create_jira_task.output.url %}
        *Jira Task:* {{ steps.create_jira_task.output.url }}
        {% endif %}
        
        Workflow: {{ workflow.name }}